name: Bug report
description: Something isn't working as expected.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "KeyPool throws X when I do Y..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest code snippet that reproduces the issue.
      render: typescript
      placeholder: |
        import { KeyPool } from 'keymux'

        const client = new KeyPool({ keys: ['key1', 'key2'] })
        // ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "I expected KeyPool to..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error message and stack trace if applicable.
      placeholder: "Instead, it threw..."
    validations:
      required: true

  - type: input
    id: keymux-version
    attributes:
      label: keymux version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: openai-version
    attributes:
      label: openai SDK version
      placeholder: "6.x.x"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.x"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: API provider
      options:
        - Gemini (Google AI Studio)
        - OpenAI
        - DeepSeek
        - Other OpenAI-compatible
    validations:
      required: true
