name: Feature request
description: Suggest a new feature or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
      placeholder: "When I have N keys and M concurrent users, I need..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: "A `onRateLimit` callback that fires each time a single key hits 429..."
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Ideal API (optional)
      description: If you have a concrete API in mind, show it here.
      render: typescript
      placeholder: |
        new KeyPool({
          keys: [...],
          onRateLimit: (maskedKey, retryCount) => {
            console.warn(`Key ${maskedKey} hit 429 (attempt ${retryCount})`)
          }
        })

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or tried.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this.
